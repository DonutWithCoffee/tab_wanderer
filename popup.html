<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>

        :root {
            --bg: #f6f7fb;
            --surface: #ffffff;
            --surface-muted: #f9fafb;
            --border: #d9dee7;
            --border-strong: #c4ccd8;
            --text: #1f2937;
            --muted: #5f6b7a;
            --primary: #2458d3;
            --primary-hover: #1d47ae;
            --success: #177245;
            --danger: #b42318;
            --warning: #9a6700;
            --radius: 12px;
            --shadow: 0 1px 2px rgba(16, 24, 40, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-width: 360px;
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: var(--bg);
        }

        h3 {
            margin: 0;
            font-size: 16px;
            line-height: 1.2;
        }

        button {
            width: 100%;
            min-height: 36px;
            padding: 8px 12px;
            border: 1px solid var(--border-strong);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            text-align: center;
            font-size: 13px;
            line-height: 1.2;
            transition: background 0.12s ease, border-color 0.12s ease, color 0.12s ease;
        }

        button:hover {
            background: var(--surface-muted);
            border-color: #aeb7c5;
        }

        button:focus-visible,
        input:focus-visible {
            outline: 2px solid rgba(36, 88, 211, 0.35);
            outline-offset: 2px;
        }

        input[type="text"] {
            border: 1px solid var(--border-strong);
            border-radius: 9px;
            background: var(--surface);
            color: var(--text);
        }

        input::placeholder {
            color: #8a94a3;
        }

        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        #version {
            color: var(--muted);
            font-size: 12px;
            white-space: nowrap;
        }

        .status-card,
        .section {
            margin-bottom: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            box-shadow: var(--shadow);
        }

        .status-card {
            border-left: 4px solid var(--primary);
        }

        #status {
            margin-bottom: 5px;
            font-weight: 700;
            font-size: 14px;
            line-height: 1.3;
        }

        #statusDetails {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .running {
            color: var(--success);
        }

        .stopped {
            color: var(--danger);
        }

        .warming {
            color: var(--warning);
        }

        .primary-action {
            margin-top: 10px;
            border-color: var(--primary);
            background: var(--primary);
            color: #fff;
            font-weight: 700;
        }

        .primary-action:hover {
            border-color: var(--primary-hover);
            background: var(--primary-hover);
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .actions-grid .wide {
            grid-column: 1 / -1;
        }

        .hint {
            margin: 7px 0 0;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.4;
        }

        .section-title {
            margin: 0 0 8px;
            font-size: 13px;
            line-height: 1.3;
            font-weight: 700;
        }

        .inline-form {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .inline-form input[type="text"] {
            flex: 1;
            min-width: 0;
            padding: 9px 10px;
            font-size: 13px;
        }

        .stack-form {
            display: grid;
            gap: 8px;
        }

        .stack-form input[type="text"] {
            width: 100%;
            padding: 9px 10px;
            font-size: 13px;
        }

        .inline-form button {
            flex: 0 0 auto;
            width: auto;
            white-space: nowrap;
        }

        #popupAddWatchedOrder {
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 700;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 8px 0;
            font-size: 12px;
            line-height: 1.4;
        }

        .checkbox-row input {
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Tab Wanderer</h3>
        <div id="version"></div>
    </div>

    <div class="status-card">
        <div id="status">Статус: загрузка...</div>
        <div id="statusDetails">Получаем состояние мониторинга...</div>
        <button id="toggleMonitor" class="primary-action">Включить мониторинг</button>
    </div>

    <div class="section">
        <p class="section-title">Не уведомлять о:</p>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreLegalEntityPayment" name="popupIgnoreLegalEntityPayment" autocomplete="off">
            Юрлицах / безналичной оплате для юридических лиц
        </label>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreOzon" name="popupIgnoreOzon" autocomplete="off">
            ОЗОН-заказах
        </label>
        <div id="quickSuppressStatus" class="hint">Загрузка фильтров...</div>
    </div>

    <div class="section">
        <p class="section-title">Добавить в отслеживание</p>
        <div class="stack-form">
            <div class="inline-form">
                <input id="popupWatchedOrderInput" name="popupWatchedOrderInput" type="text" placeholder="1234-110626" autocomplete="off">
                <button id="popupAddWatchedOrder" type="button">Добавить</button>
            </div>
            <input id="popupWatchedOrderNote" name="popupWatchedOrderNote" type="text" maxlength="300" placeholder="Комментарий к заказу (опционально)" autocomplete="off">
        </div>
        <div id="popupWatchedOrderStatus" class="hint">Нужен полный номер заказа. Список — на странице “Отслеживаемые заказы”.</div>
    </div>

    <div class="actions-grid">
        <button id="openWatchedOrders">Отслеживаемые заказы</button>
        <button id="openOptions">Настройки</button>
        <button id="downloadDiagnosticLog" class="wide">Скачать диагностический лог</button>
    </div>

    <div id="diagnosticLogStatus" class="hint"></div>

    <script src="popup.js"></script>
</body>
</html>
