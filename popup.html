<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            min-width: 300px;
            margin: 0;
            padding: 14px;
            font-family: Arial, sans-serif;
            color: #222;
        }

        h3 {
            margin: 0 0 8px;
        }

        #version {
            margin-bottom: 8px;
            color: #666;
            font-size: 12px;
        }

        #status {
            margin-bottom: 12px;
            font-weight: bold;
        }

        .running {
            color: green;
        }

        .stopped {
            color: red;
        }

        .warming {
            color: #a15c00;
        }

        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
            text-align: left;
        }

        .hint {
            margin: 8px 0 0;
            color: #555;
            font-size: 12px;
            line-height: 1.35;
        }
    </style>
</head>
<body>
    <h3>tab_wanderer</h3>

    <div id="version"></div>
    <div id="status">Статус: ...</div>

    <div class="actions-group">
        <button id="toggleMonitor">Start monitoring</button>
        <button id="openOptions">Open settings</button>
        <button id="openHistory">Open history</button>
        <button id="downloadDiagnosticLog">Download diagnostic log</button>
    </div>

    <div id="diagnosticLogStatus" class="hint"></div>

    <script src="popup.js"></script>
</body>
</html>
