<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            box-sizing: border-box;
            min-width: 340px;
            margin: 0;
            padding: 14px;
            font-family: Arial, sans-serif;
            color: #222;
            background: #fff;
        }

        h3 {
            margin: 0;
            font-size: 16px;
        }

        button {
            box-sizing: border-box;
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #cfcfcf;
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            text-align: center;
            font-size: 13px;
        }

        button:hover {
            background: #f3f3f3;
        }

        .header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
        }

        #version {
            color: #666;
            font-size: 12px;
            white-space: nowrap;
        }

        .status-card {
            margin-bottom: 12px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f8f8f8;
        }

        #status {
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        #statusDetails {
            color: #555;
            font-size: 12px;
            line-height: 1.35;
        }

        .running {
            color: #168018;
        }

        .stopped {
            color: #b00020;
        }

        .warming {
            color: #a15c00;
        }

        .primary-action {
            margin-top: 10px;
            font-weight: bold;
        }

        .actions-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .actions-grid .wide {
            grid-column: 1 / -1;
        }

        .hint {
            margin: 7px 0 0;
            color: #555;
            font-size: 12px;
            line-height: 1.35;
        }

        .section {
            margin: 12px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
        }

        .section-title {
            margin: 0 0 8px;
            font-size: 13px;
            font-weight: bold;
        }

        .inline-form {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .inline-form input[type="text"] {
            box-sizing: border-box;
            flex: 1;
            min-width: 0;
            padding: 8px;
            border: 1px solid #cfcfcf;
            border-radius: 6px;
            font-size: 13px;
        }

        .stack-form {
            display: grid;
            gap: 6px;
        }

        .stack-form input[type="text"] {
            box-sizing: border-box;
            width: 100%;
            padding: 8px;
            border: 1px solid #cfcfcf;
            border-radius: 6px;
            font-size: 13px;
        }

        .inline-form button {
            flex: 0 0 auto;
            width: auto;
            white-space: nowrap;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 6px 0;
            font-size: 12px;
            line-height: 1.35;
        }

        .checkbox-row input {
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h3>Tab Wanderer</h3>
        <div id="version"></div>
    </div>

    <div class="status-card">
        <div id="status">Статус: загрузка...</div>
        <div id="statusDetails">Получаем состояние мониторинга...</div>
        <button id="toggleMonitor" class="primary-action">Включить мониторинг</button>
    </div>

    <div class="section">
        <p class="section-title">Не уведомлять о:</p>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreLegalEntityPayment">
            Юрлицах / безналичной оплате для юридических лиц
        </label>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreOzon">
            ОЗОН-заказах
        </label>
        <div id="quickSuppressStatus" class="hint">Загрузка фильтров...</div>
    </div>

    <div class="section">
        <p class="section-title">Добавить в отслеживание</p>
        <div class="stack-form">
            <div class="inline-form">
                <input id="popupWatchedOrderInput" type="text" placeholder="1234-110626" autocomplete="off">
                <button id="popupAddWatchedOrder" type="button">Добавить</button>
            </div>
            <input id="popupWatchedOrderNote" type="text" maxlength="300" placeholder="Комментарий к заказу (опционально)" autocomplete="off">
        </div>
        <div id="popupWatchedOrderStatus" class="hint">Нужен полный номер заказа. Список — на странице “Отслеживаемые заказы”.</div>
    </div>

    <div class="actions-grid">
        <button id="openWatchedOrders">Отслеживаемые заказы</button>
        <button id="openOptions">Настройки</button>
        <button id="downloadDiagnosticLog" class="wide">Скачать диагностический лог</button>
    </div>

    <div id="diagnosticLogStatus" class="hint"></div>

    <script src="popup.js"></script>
</body>
</html>
