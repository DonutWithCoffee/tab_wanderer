<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            min-width: 320px;
            font-family: Arial, sans-serif;
        }

        #status {
            font-weight: bold;
            margin-top: 5px;
        }

        .running {
            color: green;
        }

        .stopped {
            color: red;
        }

        .section-title {
            font-weight: bold;
        }

        .mode-group,
        .rules-group,
        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        details {
            margin-bottom: 8px;
        }

        summary {
            cursor: pointer;
            user-select: none;
        }

        .scope-options {
            margin-top: 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .scope-option {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #configStatus {
            font-weight: bold;
        }
    </style>
</head>
<body>

<h3>tab_wanderer</h3>

<div id="version"></div>
<div id="status">Status: ...</div>

<hr>

<button id="start">START</button>
<button id="stop">STOP</button>

<hr>

<div class="section-title">Режим мониторинга</div>

<br>

<div class="mode-group">
    <label>
        <input type="radio" name="monitorMode" id="monitorModeWindowed" value="windowed">
        Windowed monitoring
    </label>

    <label>
        <input type="radio" name="monitorMode" id="monitorModeActive" value="active">
        Active page monitoring
    </label>
</div>

<hr>

<div class="section-title">Rules</div>

<br>

<div class="rules-group">
    <label>
        <input type="checkbox" id="ignoreOzon">
        Игнорировать ОЗОН
    </label>

    <label>
        <input type="checkbox" id="ignoreJurics">
        Игнорировать юриков
    </label>
</div>

<hr>

<div class="section-title">Monitor Scope</div>

<br>

<details>
    <summary id="scopeStatusSummary">Статус</summary>
    <div id="scopeStatusOptions" class="scope-options"></div>
</details>

<details>
    <summary id="scopeDeliverySummary">Доставка</summary>
    <div id="scopeDeliveryOptions" class="scope-options"></div>
</details>

<details>
    <summary id="scopePaymentSummary">Оплата</summary>
    <div id="scopePaymentOptions" class="scope-options"></div>
</details>

<hr>

<div id="configStatus">No changes</div>

<br>

<div class="actions-group">
    <button id="applyConfig">Apply</button>
    <button id="resetConfig">Reset</button>
</div>

<script src="popup.js"></script>
</body>
</html>
