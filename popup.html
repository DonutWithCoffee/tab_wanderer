<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            min-width: 300px;
            margin: 0;
            padding: 14px;
            font-family: Arial, sans-serif;
            color: #222;
        }

        h3 {
            margin: 0 0 8px;
        }

        #version {
            margin-bottom: 8px;
            color: #666;
            font-size: 12px;
        }

        #status {
            margin-bottom: 12px;
            font-weight: bold;
        }

        .running {
            color: green;
        }

        .stopped {
            color: red;
        }

        .warming {
            color: #a15c00;
        }

        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 8px 10px;
            cursor: pointer;
            text-align: left;
        }

        .hint {
            margin: 8px 0 0;
            color: #555;
            font-size: 12px;
            line-height: 1.35;
        }

        .quick-settings {
            margin: 12px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #f8f8f8;
        }

        .inline-form {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .inline-form input[type="text"] {
            box-sizing: border-box;
            flex: 1;
            min-width: 150px;
            padding: 7px;
            font-size: 12px;
        }

        .inline-form button {
            flex: 0 0 auto;
        }

        .quick-settings-title {
            margin: 0 0 8px;
            font-size: 13px;
            font-weight: bold;
        }

        .checkbox-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin: 6px 0;
            font-size: 12px;
            line-height: 1.35;
        }

        .checkbox-row input {
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <h3>tab_wanderer</h3>

    <div id="version"></div>
    <div id="status">Статус: ...</div>

    <div class="quick-settings">
        <p class="quick-settings-title">Быстрые фильтры уведомлений</p>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreLegalEntityPayment">
            Игнорировать юриков
        </label>
        <label class="checkbox-row">
            <input type="checkbox" id="popupIgnoreOzon">
            Игнорировать ОЗОН
        </label>
        <div id="quickSuppressStatus" class="hint">Загрузка фильтров...</div>
    </div>

    <div class="quick-settings">
        <p class="quick-settings-title">Быстрое отслеживание</p>
        <div class="inline-form">
            <input id="popupWatchedOrderInput" type="text" placeholder="1234-110626" autocomplete="off">
            <button id="popupAddWatchedOrder" type="button">Отслеживать</button>
        </div>
        <div id="popupWatchedOrderStatus" class="hint">Введите полный номер заказа.</div>
    </div>

    <div class="actions-group">
        <button id="toggleMonitor">Start monitoring</button>
        <button id="openOptions">Open settings</button>
        <button id="openHistory">Открыть заказы</button>
        <button id="downloadDiagnosticLog">Download diagnostic log</button>
    </div>

    <div id="diagnosticLogStatus" class="hint"></div>

    <script src="popup.js"></script>
</body>
</html>
